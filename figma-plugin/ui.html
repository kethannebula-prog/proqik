<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: Poppins, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; text-align: center; }
    h2 { color: #24523B; font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    p { color: #666; font-size: 10px; margin: 2px 0 8px; }
    button {
      background: #24523B; color: white; border: none; border-radius: 10px;
      padding: 10px 28px; font-size: 11px; cursor: pointer; font-family: Poppins, sans-serif; font-weight: 600;
    }
    button:hover { background: #1a3d2c; }
    .info { font-size: 8px; color: #999; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>BSP Wallet Rewards</h2>
  <p>6 screens matching app design</p>
  <button id="generate">Generate Screens</button>
  <div class="info">Creates: Dashboard → Points → Redeem → Wallet → MPIN → Success</div>
  <script>
    document.getElementById('generate').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'generate' } }, '*');
    };
  </script>
</body>
</html>
